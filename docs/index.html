<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>DraftLite</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="brand">
          <strong class="brand-title">DraftLite</strong>
        </div>

        <div class="toolbar-shell">
          <div class="toolbar" role="toolbar" aria-label="Drafting tools">
            <div class="toolbar-group" role="group" aria-label="Draw tools">
              <span class="toolbar-group-label">Draw</span>
              <button id="toolSelectButton" class="tool-button is-active" type="button" data-tool="select" data-testid="tool-select">
                <span class="tool-icon">↖</span><span>Select</span>
              </button>
              <button id="toolLineButton" class="tool-button" type="button" data-tool="line" data-testid="tool-line">
                <span class="tool-icon">／</span><span>Line</span>
              </button>
              <button id="rectangleButton" class="tool-button" type="button" data-tool="rectangle" data-testid="tool-rectangle">
                <span class="tool-icon">▭</span><span>Rectangle</span>
              </button>
              <button id="textButton" class="tool-button" type="button" data-tool="text" data-testid="tool-text">
                <span class="tool-icon">T</span><span>Text</span>
              </button>
            </div>
            <div class="toolbar-group" role="group" aria-label="Modify tools">
              <span class="toolbar-group-label">Modify</span>
              <button id="moveButton" class="tool-button" type="button" data-tool="move" data-testid="tool-move">
                <span class="tool-icon">✥</span><span>Move</span>
              </button>
              <button id="copyButton" class="tool-button" type="button" data-tool="copy" data-testid="tool-copy">
                <span class="tool-icon">⧉</span><span>Copy</span>
              </button>
              <button id="alignButton" class="tool-button" type="button" data-tool="align" data-testid="tool-align">
                <span class="tool-icon">⇔</span><span>Align</span>
              </button>
              <button id="extendButton" class="tool-button" type="button" data-tool="extend" data-testid="tool-extend">
                <span class="tool-icon">⇱</span><span>Extend</span>
              </button>
              <button id="filletButton" class="tool-button" type="button" data-tool="fillet" data-testid="tool-fillet">
                <span class="tool-icon">⌞</span><span>Fillet</span>
              </button>
              <button id="deleteButton" class="tool-button" type="button" data-testid="tool-delete"><span class="tool-icon">×</span><span>Delete</span></button>
              <button id="explodeButton" class="tool-button" type="button" data-testid="tool-explode"><span class="tool-icon">⨯</span><span>Explode</span></button>
              <button id="undoButton" class="tool-button" type="button" data-testid="tool-undo"><span class="tool-icon">↶</span><span>Undo</span></button>
              <button id="redoButton" class="tool-button" type="button" data-testid="tool-redo"><span class="tool-icon">↷</span><span>Redo</span></button>
              <button id="fitAllButton" class="tool-button" type="button" data-testid="tool-fit-all"><span class="tool-icon">⛶</span><span>Fit All</span></button>
            </div>
            <details class="toolbar-group toolbar-group-file">
              <summary class="tool-button toolbar-menu-button" aria-label="File tools">
                <span class="tool-icon">▾</span><span>File</span>
              </summary>
              <div class="toolbar-menu" role="group" aria-label="File tools">
                <button id="saveJsonButton" class="tool-button" type="button" data-testid="save-json"><span class="tool-icon">⬇</span><span>Save JSON</span></button>
                <button id="loadJsonButton" class="tool-button" type="button" data-testid="load-json"><span class="tool-icon">⬆</span><span>Load JSON</span></button>
                <button id="exportDxfButton" class="tool-button" type="button" data-testid="export-dxf"><span class="tool-icon">DXF</span><span>Export DXF</span></button>
              </div>
            </details>
          </div>
          <button id="themeToggleButton" class="tool-button theme-toggle" type="button" data-testid="theme-toggle">Dark</button>
        </div>
      </header>

      <main class="workspace">
        <section class="canvas-shell" aria-label="Drafting canvas area">
          <div class="canvas-header">
            <div class="canvas-meta">
              <span id="toolReadout">Tool: Select</span>
              <span id="pointerReadout">X: 0 mm, Y: 0 mm</span>
            </div>
            <div class="canvas-meta">
              <span id="zoomReadout">Zoom: 100%</span>
              <span id="statusReadout" data-testid="status-readout">Ready.</span>
            </div>
          </div>
          <div id="canvasViewport" class="canvas-viewport" data-testid="canvas-viewport">
            <canvas id="draftCanvas" aria-label="DraftLite canvas" data-testid="draft-canvas"></canvas>
          </div>
        </section>

        <aside class="sidebar" aria-label="Layers and properties">
          <section class="panel">
            <div class="panel-header">
              <h2>Layers</h2>
              <button id="addLayerButton" class="panel-button" type="button">Add</button>
            </div>
            <div id="layerList" class="layer-list"></div>
          </section>

          <section class="panel">
            <div class="panel-header">
              <h2>Properties</h2>
            </div>
            <div id="propertiesPanel" class="properties-panel"></div>
          </section>

          <section class="panel">
            <div class="panel-header">
              <h2>Status</h2>
            </div>
            <dl id="statusPanel" class="status-panel" data-testid="status-panel"></dl>
          </section>
        </aside>
      </main>
    </div>

    <input id="loadJsonInput" type="file" accept=".json,application/json" hidden />
    <textarea
      id="draftliteDebugBridgeRequest"
      data-testid="debug-bridge-request"
      aria-hidden="true"
      tabindex="-1"
      autocomplete="off"
      spellcheck="false"
      style="position: fixed; left: -9999px; top: -9999px; width: 1px; height: 1px; opacity: 0; pointer-events: none;"
    ></textarea>
    <div
      id="draftliteDebugBridgeOutput"
      data-testid="debug-bridge-output"
      data-request-id=""
      data-request-command=""
      data-request-args=""
      data-last-command-id=""
      data-last-command=""
      data-last-ok=""
      data-last-result=""
      data-last-error=""
      hidden
    ></div>

    <script src="app.js"></script>
  </body>
</html>
