<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>DraftLite</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="shell">
      <section class="hero">
        <p class="eyebrow">DraftLite</p>
        <h1>素早く下書きを組み立てるための軽量な作業面。</h1>
        <p class="lede">
          この雛形は、あとから内容を差し替えやすい静的なベースとして用意しています。
        </p>
        <div class="actions">
          <button id="primaryAction" type="button">メモを追加</button>
          <button id="secondaryAction" type="button" class="ghost">内容を整える</button>
        </div>
      </section>

      <section class="panel">
        <div class="panel-header">
          <h2>Draft Board</h2>
          <span id="status" class="status">Ready</span>
        </div>
        <ul id="draftList" class="draft-list" aria-live="polite"></ul>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
